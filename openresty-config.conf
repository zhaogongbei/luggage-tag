# ============================================================
# OpenResty 配置示例 - luggage-tag
# 部署域名: https://tag.ycgg.cc.cd
# ============================================================

server {
    listen 80;
    server_name tag.ycgg.cc.cd;

    # HTTP 自动跳转到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tag.ycgg.cc.cd;

    # SSL 证书配置（根据你的实际路径修改）
    ssl_certificate /path/to/ssl/cert/tag.ycgg.cc.cd.crt;
    ssl_certificate_key /path/to/ssl/cert/tag.ycgg.cc.cd.key;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 客户端上传限制（支持图片上传，最大 12MB）
    client_max_body_size 12M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/x-javascript image/svg+xml;

    # 日志
    access_log /var/log/openresty/luggage-tag-access.log;
    error_log /var/log/openresty/luggage-tag-error.log warn;

    # 反向代理到 Node.js 后端（包含前端静态文件服务）
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # 代理头信息（保留真实客户端信息）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket 支持（如果未来需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cookie 支持
        proxy_cookie_path / /;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 健康检查端点（可选）
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        access_log off;
    }
}
